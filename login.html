<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - JobNexus</title>
    <meta name="description" content="Sign in to your JobNexus account to find jobs, track applications, and manage your profile.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { inter: ['Inter','sans-serif'], outfit:['Outfit','sans-serif'] }, colors: { primary:{50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81'}, accent:{400:'#fb923c',500:'#f97316',600:'#ea580c'}, dark:{900:'#0f0f23',800:'#1a1a2e',700:'#16213e',600:'#0f3460'} } } } }
    </script>
</head>
<body class="font-inter bg-dark-900 text-white min-h-screen overflow-x-hidden">

    <!-- Background -->
    <div class="fixed inset-0">
        <div style="background: radial-gradient(ellipse at top left, rgba(99,102,241,0.25) 0%, transparent 60%), radial-gradient(ellipse at bottom right, rgba(249,115,22,0.15) 0%, transparent 60%), linear-gradient(180deg,#0f0f23 0%,#1a1a2e 100%); position:absolute;inset:0;"></div>
        <div class="grid-pattern opacity-10" style="position:absolute;inset:0;"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Nav -->
    <nav class="relative z-50 px-6 py-5 flex items-center justify-between">
        <a href="index.html" class="flex items-center space-x-3 group">
            <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-accent-500 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/30 group-hover:scale-110 transition-transform duration-300">
                <i class="fas fa-briefcase text-white text-sm"></i>
            </div>
            <span class="font-outfit font-bold text-2xl bg-gradient-to-r from-primary-400 to-accent-400 bg-clip-text text-transparent">JobNexus</span>
        </a>
        <a href="index.html" class="text-sm text-gray-400 hover:text-white transition-colors flex items-center gap-2">
            <i class="fas fa-arrow-left text-xs"></i>Back to Home
        </a>
    </nav>

    <!-- Login Form -->
    <div class="relative z-10 flex items-center justify-center min-h-[calc(100vh-80px)] px-4 py-12">
        <div class="w-full max-w-md">
            <!-- Card -->
            <div class="glass border border-white/10 rounded-3xl p-8 shadow-2xl shadow-black/30 animate-slide-up">
                <!-- Header -->
                <div class="text-center mb-8">
                    <div class="w-16 h-16 bg-gradient-to-br from-primary-500 to-accent-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-500/30">
                        <i class="fas fa-user text-white text-xl"></i>
                    </div>
                    <h1 class="font-outfit font-bold text-2xl text-white mb-2">Welcome Back!</h1>
                    <p class="text-gray-400 text-sm">Sign in to continue your job search</p>
                </div>

                <!-- Social Login -->
                <div class="flex gap-3 mb-6">
                    <button onclick="socialLogin('Google')" class="flex-1 btn-outline py-3 rounded-xl text-sm flex items-center justify-center gap-2 hover:bg-white/10 transition-all">
                        <i class="fab fa-google text-red-400"></i><span>Google</span>
                    </button>
                    <button onclick="socialLogin('LinkedIn')" class="flex-1 btn-outline py-3 rounded-xl text-sm flex items-center justify-center gap-2 hover:bg-white/10 transition-all">
                        <i class="fab fa-linkedin text-blue-400"></i><span>LinkedIn</span>
                    </button>
                    <button onclick="socialLogin('GitHub')" class="flex-1 btn-outline py-3 rounded-xl text-sm flex items-center justify-center gap-2 hover:bg-white/10 transition-all">
                        <i class="fab fa-github text-gray-300"></i><span>GitHub</span>
                    </button>
                </div>

                <div class="flex items-center gap-3 mb-6">
                    <div class="flex-1 h-px bg-white/10"></div>
                    <span class="text-xs text-gray-500">or sign in with email</span>
                    <div class="flex-1 h-px bg-white/10"></div>
                </div>

                <!-- Form -->
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="loginEmail"><i class="fas fa-envelope mr-2 text-primary-400 text-xs"></i>Email Address</label>
                        <input type="email" id="loginEmail" class="form-input" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="loginPassword">
                            <i class="fas fa-lock mr-2 text-primary-400 text-xs"></i>Password
                        </label>
                        <div class="relative">
                            <input type="password" id="loginPassword" class="form-input pr-12" placeholder="••••••••" required>
                            <button type="button" onclick="togglePassword('loginPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white transition-colors p-1">
                                <i class="far fa-eye text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="flex items-center justify-between mb-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="rememberMe" class="rounded" style="accent-color:#6366f1;width:14px;height:14px;">
                            <span class="text-sm text-gray-400">Remember me</span>
                        </label>
                        <a href="#" onclick="showForgotPassword()" class="text-sm text-primary-400 hover:text-primary-300 transition-colors">Forgot password?</a>
                    </div>

                    <!-- Login Type -->
                    <div class="mb-6">
                        <p class="form-label mb-2"><i class="fas fa-user-tag mr-2 text-accent-400 text-xs"></i>Login As</p>
                        <div class="grid grid-cols-3 gap-2">
                            <label class="role-option" id="roleJobseeker">
                                <input type="radio" name="role" value="jobseeker" checked class="sr-only">
                                <i class="fas fa-user-tie text-sm mb-1"></i>
                                <span class="text-xs">Job Seeker</span>
                            </label>
                            <label class="role-option" id="roleEmployer">
                                <input type="radio" name="role" value="employer" class="sr-only">
                                <i class="fas fa-building text-sm mb-1"></i>
                                <span class="text-xs">Employer</span>
                            </label>
                            <label class="role-option" id="roleAdmin">
                                <input type="radio" name="role" value="admin" class="sr-only">
                                <i class="fas fa-shield-alt text-sm mb-1"></i>
                                <span class="text-xs">Admin</span>
                            </label>
                        </div>
                    </div>

                    <!-- Error msg -->
                    <div id="loginError" class="hidden mb-4 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-sm flex items-center gap-2">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="loginErrorMsg"></span>
                    </div>

                    <button type="submit" id="loginBtn" class="btn-primary w-full py-3.5 rounded-xl text-sm font-semibold flex items-center justify-center gap-2">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Sign In</span>
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 mt-6">
                    Don't have an account? 
                    <a href="register.html" class="text-primary-400 hover:text-primary-300 font-medium transition-colors">Create one free →</a>
                </p>

                <!-- Demo hint -->
                <div class="mt-6 p-4 rounded-xl bg-primary-500/10 border border-primary-500/20">
                    <p class="text-xs text-primary-300 font-medium mb-2"><i class="fas fa-info-circle mr-1"></i>Demo Credentials</p>
                    <p class="text-xs text-gray-400">Email: <span class="text-white font-mono">demo@jobnexus.com</span></p>
                    <p class="text-xs text-gray-400">Password: <span class="text-white font-mono">demo1234</span></p>
                    <button onclick="fillDemo()" class="mt-2 text-xs text-primary-400 hover:underline">Auto-fill demo →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal-overlay">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-6">
                <h3 class="font-outfit font-bold text-xl text-white">Reset Password</h3>
                <button onclick="document.getElementById('forgotModal').classList.remove('active')" class="text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <p class="text-gray-400 text-sm mb-6">Enter your email and we'll send a reset link.</p>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="forgotEmail" class="form-input" placeholder="john@example.com">
            </div>
            <button onclick="sendResetLink()" class="btn-primary w-full py-3 rounded-xl text-sm font-semibold">
                <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 z-[100] transform translate-y-20 opacity-0 transition-all duration-500">
        <div class="glass border border-white/20 rounded-2xl px-5 py-4 flex items-center space-x-3 shadow-2xl">
            <div id="toastIcon" class="w-8 h-8 rounded-full flex items-center justify-center"></div>
            <span id="toastMsg" class="text-sm font-medium text-white"></span>
        </div>
    </div>

    <style>
        .role-option {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 10px 8px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #64748b; cursor: pointer;
            transition: all 0.3s ease; font-weight: 500;
            background: rgba(255,255,255,0.03);
        }
        .role-option:has(input:checked) {
            background: rgba(99,102,241,0.15);
            border-color: rgba(99,102,241,0.5);
            color: #818cf8;
        }
        .role-option:hover { border-color: rgba(99,102,241,0.3); color: #a5b4fc; }
    </style>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            const errorMsg = document.getElementById('loginErrorMsg');

            // Loading state
            btn.innerHTML = '<div class="loader" style="width:20px;height:20px;border-width:2px;"></div><span>Signing in...</span>';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                const data = await Auth.login(email, pass, role);
                showToast('Welcome back! Redirecting...', 'success');
                setTimeout(() => {
                    if (data.user.role === 'employer') window.location.href = 'employer-dashboard.html';
                    else if (data.user.role === 'admin') window.location.href = 'admin.html';
                    else window.location.href = 'dashboard.html';
                }, 1000);
            } catch (err) {
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Sign In</span>';
                btn.disabled = false;
                errorMsg.textContent = err.message || 'Invalid email or password.';
                errorDiv.classList.remove('hidden');
                errorDiv.style.display = 'flex';
            }
        }

        function socialLogin(provider) {
            showToast(`${provider} login is not configured yet.`, 'info');
        }

        function togglePassword(fieldId, btn) {
            const field = document.getElementById(fieldId);
            const isPass = field.type === 'password';
            field.type = isPass ? 'text' : 'password';
            btn.querySelector('i').className = isPass ? 'far fa-eye-slash text-sm' : 'far fa-eye text-sm';
        }

        function showForgotPassword() {
            document.getElementById('forgotModal').classList.add('active');
        }

        function sendResetLink() {
            showToast('Reset link sent to your email!', 'success');
            document.getElementById('forgotModal').classList.remove('active');
        }

        function fillDemo() {
            document.getElementById('loginEmail').value = 'demo@jobnexus.com';
            document.getElementById('loginPassword').value = 'demo1234';
        }
    </script>
</body>
</html>
